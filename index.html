</select>

    <script>
function normalizeGrade(g){
 if(!g) return '';
 // 「学年：」を取り除いてシンプルにする
 let val = g.replace('学年：', '');
 const map={
  '小学1年':'小1','小学2年':'小2','小学3年':'小3','小学4年':'小4','小学5年':'小5','小学6年':'小6',
  '中学1年':'中1','中学2年':'中2','中学3年':'中3',
  '高校1年':'高1','高校2年':'高2','高校3年':'高3'
 };
 return map[val] || val;
}

        document.addEventListener('DOMContentLoaded', () => { 
            if (typeof YubinBango !== 'undefined') new YubinBango.Core(); 
            const today = new Date();
            const offset = today.getTimezoneOffset();
            const localDate = new Date(today.getTime() - (offset * 60 * 1000));
            document.getElementById('cal-today').value = localDate.toISOString().split('T')[0];
        });
        
        window.calcGrade = (birthDate) => {
            if(!birthDate) return "-";
            const birth = new Date(birthDate);
            if (isNaN(birth.getTime())) return "-";
            const today = new Date();
            let schoolYear = today.getFullYear();
            if (today.getMonth() < 3) schoolYear--;
            let grade = schoolYear - birth.getFullYear() - 5;
            const m = birth.getMonth() + 1;
            const d = birth.getDate();
            if (m > 4 || (m === 4 && d >= 2)) grade--;
            if (grade >= 1 && grade <= 6) return "小" + grade;
            if (grade >= 7 && grade <= 9) return "中" + (grade - 6);
            if (grade >= 10 && grade <= 12) return "高" + (grade - 9);
            return "既卒";
        };
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCZeaZOi34sUgtmGgKT0NRmlR7zkW03rKA", authDomain: "juku-kanri-system.firebaseapp.com", projectId: "juku-kanri-system", storageBucket: "juku-kanri-system.firebasestorage.app", messagingSenderId: "525148833125", appId: "1:525148833125:web:36bee786e3545bd7908d8c" }));
        let cachedData = [];
        let trialsData = [];
        const timeOptions = `<option>①17:00</option><option>②18:10</option><option>③19:20</option><option>④20:30</option><option>⑤13:40</option><option>⑥14:50</option><option>⑦16:00</option><option>⑧17:30</option><option>⑨18:40</option><option>⑩19:50</option>`;
        const famContainer = document.getElementById('fam-container');
        for(let i=1; i<=4; i++) {
            famContainer.innerHTML += `<div class="p-2 border rounded bg-slate-50"><input type="text" id="fam-name${i}" placeholder="氏名" class="input-styled mb-1"><input type="text" id="fam-kana${i}" placeholder="フリガナ" class="input-styled mb-1"><input type="text" id="fam-rel${i}" placeholder="続柄" class="input-styled mb-1"><input type="text" id="fam-birth${i}" placeholder="生年月日" class="input-styled mb-1" onfocus="(this.type='date')" onblur="(this.type='text')" onchange="document.getElementById('fam-grade${i}').innerText = window.calcGrade(this.value)"><div class="flex items-center gap-1 border-2 border-slate-300 rounded bg-white px-2"><span class="text-xs text-slate-500 font-bold whitespace-nowrap"><span id="fam-grade${i}">-</span></span><input type="text" id="fam-work${i}" placeholder="勤務先/学校名" class="flex-1 p-1 outline-none text-sm"></div></div>`;
        }
        const getColor = (t) => { const colors = {'①': '#fee2e2', '②': '#fef3c7', '③': '#dcfce7', '④': '#dbeafe', '⑤': '#f1f5f9', '⑥': '#f3e8ff', '⑦': '#ffe4e6', '⑧': '#fef9c3', '⑨': '#ccfbf1', '⑩': '#e0f2fe'}; return colors[t.substring(0,1)] || '#ffffff'; };
        const createRow = (d="月", t="①17:00", s="算数") => { const div = document.createElement('div'); div.className = "schedule-row"; div.style.backgroundColor = getColor(t); div.style.padding = "5px"; div.style.borderRadius = "4px"; div.style.marginBottom = "5px"; div.innerHTML = `<select class="day border p-2 text-sm bg-white"><option>月</option><option>火</option><option>水</option><option>木</option><option>金</option><option>土</option></select><select class="time border p-2 text-sm bg-white" onchange="this.parentElement.style.backgroundColor = getColor(this.value)">${timeOptions}</select><select class="sub border p-2 text-sm bg-white"><option>算数</option><option>数学</option><option>英語</option><option>国語</option><option>理科</option><option>社会</option><option>情報</option><option>物理</option><option>化学</option><option>生物</option></select>`; div.querySelector('.day').value = d; div.querySelector('.time').value = t; div.querySelector('.sub').value = s; return div; };
        
        window.convertTrial = async (t) => {
            document.getElementById('stu-id').value = Date.now().toString();
            document.getElementById('stu-name').value = t.name || '';
            document.getElementById('grade-result').innerText = t.grade || '-';
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active-tab'));
            document.getElementById('tab1').classList.add('active');
            document.getElementById('nav1').classList.add('nav-active-tab');
            window.pendingTrialConversion = t.id; document.getElementById("cancel-trial-convert").classList.remove("hidden");
            alert("登録編集タブへ移動しました。内容を確認して保存してください。");
        };

        
const lessonSlotsWeekday=['①17:00','②18:10','③19:20','④20:30'];
const lessonSlotsSaturday=['①17:00','②18:10','③19:20','④20:30','⑤13:40','⑥14:50','⑦16:00','⑧17:30','⑨18:40','⑩19:50'];

function renderScheduleTable(events, dayStr){
 const isSat = dayStr==='土';
 const slots=isSat?lessonSlotsSaturday:lessonSlotsWeekday;
 const todayList=document.getElementById('today-list');
 todayList.innerHTML='';
 slots.forEach(slot=>{
   const rows=events.filter(e=>e.time===slot);
   let html=`<div class="border rounded overflow-hidden mb-4">
   <div style="background:${getColor(slot)}" class="font-bold p-2">${slot}</div>
   <table style="width:100%;table-layout:fixed;border-collapse:collapse;background:white;font-size:14px">
   <thead><tr><th>氏名</th><th>学年</th><th>教科</th><th>出席</th><th>欠席</th><th>取消</th></tr></thead><tbody>`;
   rows.forEach(ev=>{
      const g = normalizeGrade(ev.grade || '');
      html+=`<tr>
      <td style="padding:6px">${ev.name}${ev.trial ? '<br><span style="font-size:12px;color:#666">体験</span>' : ''}</td>
      <td style="padding:6px;text-align:center">${g}</td>
      <td style="padding:6px;text-align:center">${ev.sub||'-'}</td>
      <td style="padding:6px;text-align:center"><button class="att-btn" onclick="setAtt('${ev.id}','${ev.attKey}','出席','${ev.absKey||''}')">出</button></td>
      <td style="padding:6px;text-align:center"><button class="att-btn" onclick="setAtt('${ev.id}','${ev.attKey}','欠席','${ev.absKey||''}')">欠</button></td>
      <td style="padding:6px;text-align:center"><button class="att-btn" onclick="setAtt('${ev.id}','${ev.attKey}','取消','${ev.absKey||''}')">取</button></td>
      </tr>`;
   });
   if(rows.length===0) html += '<tr><td colspan="6" style="padding:8px;text-align:center;color:#999">予約なし</td></tr>';
   html+='</tbody></table></div>';
   todayList.innerHTML+=html;
 });
}

const render = () => { 
            const todayStr = document.getElementById('cal-today').value; 
            if(!todayStr) return; 
            const dayStr = ["日", "月", "火", "水", "木", "金", "土"][new Date(todayStr).getDay()]; 
            const studentList = document.getElementById('student-list'); 
            const todayList = document.getElementById('today-list'); 
            const makeupList = document.getElementById('makeup-list'); 
            const trialList = document.getElementById('trial-list');
            const searchBox = document.getElementById('search-box'); 
            studentList.innerHTML = ""; 
            todayList.innerHTML = ""; 
            trialList.innerHTML = "";
            makeupList.innerHTML = "<h2 class='font-bold border-b pb-2'>振替指定</h2>"; 
            searchBox.innerHTML = '<option value="">名前を選択してください...</option>'; 
            let todayEvents = []; 
            
            trialsData.forEach(t => {
                if(!t.registered) {
                    trialList.innerHTML += `<div class="p-2 border rounded flex justify-between items-center text-sm"><div><strong>${t.name}</strong><br>${t.date} ${t.time}</div><button onclick="window.convertTrial({id:'${t.id}', name:'${t.name}', grade:'${t.grade}'})" class="bg-blue-600 text-white px-2 py-1 rounded">入塾へ</button></div>`;
                }
            });


            trialsData.forEach(t => {
                if(t.date === todayStr) {
                    todayEvents.push({ name: t.name, trial:true, id: null, time: t.time, grade: t.grade, sub:(t.subject||''), attKey: "", status: "" });
                }
            });

            cachedData.forEach(s => { 
                const reservationMap = {}; (s.makeupReservations || []).forEach(r => { reservationMap[r.absKey] = r; }); s.makeupReservations = Object.values(reservationMap); searchBox.innerHTML += `<option value="${s.id}">${s.name}</option>`; const allAbsences = Object.keys(s.attendance || {}).filter(k => s.attendance[k] === '欠席'); const reservedAbsKeys = (s.makeupReservations || []).map(r => r.absKey); const remaining = Math.max(0, allAbsences.filter(k => !reservedAbsKeys.includes(k)).length); studentList.innerHTML += `<div class="border p-2 rounded text-sm"><div class="flex justify-between items-center"><div onclick="window.editMode('${s.id}')" class="cursor-pointer font-bold text-blue-600 underline">${s.name}</div><div class="text-xs text-slate-500 font-bold">振替残: ${remaining}</div></div></div>`; (s.schedules || []).filter(sc => sc.day === dayStr).forEach(sc => { const attKey = `${todayStr}_${sc.time}`; todayEvents.push({name: s.name, grade:s.grade||'', id: s.id, time: sc.time, sub: sc.sub, attKey, status: (s.attendance || {})[attKey]}); }); (s.makeupReservations || []).filter(r => r.date === todayStr).forEach(r => { todayEvents.push({name: s.name, makeup:true, id: s.id, time: r.time, sub: "振替", attKey: `makeup_${s.id}_${r.date}_${r.time}`, status: (s.attendance || {})[`makeup_${s.id}_${r.date}_${r.time}`], absKey: r.absKey}); }); const absences = Object.keys(s.attendance || {}).filter(k => s.attendance[k] === '欠席'); if (absences.length > 0) { makeupList.innerHTML += `<div class="p-3 border rounded bg-slate-50"><strong>${s.name}</strong><div class="grid gap-2 mt-2">` + absences.map(k => { const parts = k.split('_'); const activeReservations = (s.makeupReservations || []).filter(r => !r.completed); const res = activeReservations.find(r => r.absKey === k); if ((s.makeupReservations || []).some(r => r.absKey === k && r.completed)) return ''; return `<div class="text-xs p-2 border bg-white rounded flex flex-col gap-1"><span>欠席: ${parts[0]} ${parts[1]}</span>` + (res ? `<div class="text-blue-600 font-bold">予約済: ${res.date} ${res.time} <button onclick="cancelMakeup('${s.id}','${k}')" class="bg-red-500 text-white px-1 rounded ml-2">予約取消</button></div>` : `<div class="flex gap-1"><input type="date" id="d-${k}" class="border"><select id="t-${k}">${timeOptions}</select><button onclick="bookMakeup('${s.id}','${k}')" class="bg-blue-600 text-white px-2 rounded">予約</button></div>`) + `</div>`; }).join('') + `</div></div>`; } }); todayEvents.sort((a,b)=>a.time.localeCompare(b.time)); renderScheduleTable(todayEvents, dayStr); };  

        window.cancelMakeup = async (id, absKey) => { if(!confirm("予約を取り消しますか？")) return; const ref = doc(db, "students", id); const snap = await getDoc(ref); let data = snap.data(); let res = (data.makeupReservations || []).filter(r => r.absKey !== absKey); await updateDoc(ref, { makeupReservations: res }); render(); }; 
        window.setAtt = async (id, attKey, status, absKey='') => { const ref = doc(db, "students", id); const snap = await getDoc(ref); let data = snap.data(); let attendance = data.attendance || {}; attendance[attKey] = status; let reservations = data.makeupReservations || []; if (status === '出席' && absKey) { reservations = reservations.map(r => r.absKey === absKey ? {...r, completed:true} : r); await updateDoc(ref, { attendance, makeupReservations: reservations }); } else { await updateDoc(ref, { attendance }); } render(); }; 
        window.bookMakeup = async (id, absKey) => { const date = document.getElementById(`d-${absKey}`).value; const time = document.getElementById(`t-${absKey}`).value; if(!date) return alert("日付を選択"); const ref = doc(db, "students", id); const snap = await getDoc(ref); let data = snap.data(); let res = (data.makeupReservations || []).filter(r => r.absKey !== absKey); res.push({absKey, date, time, completed:false}); await updateDoc(ref, { makeupReservations: res }); alert("予約完了"); render(); }; 
        
        document.getElementById('search-box').onchange = (e) => { const s = cachedData.find(i => i.id === e.target.value); if (!s) return; let famHtml = ""; for (let i = 1; i <= 4; i++) { if (s['famName' + i]) famHtml += `<div class="text-xs">・${s['famRel' + i]}: ${s['famName' + i]}</div>`; } document.getElementById('detail-view').innerHTML = `
<div class="font-bold text-lg">${s.name}</div>
<div>学年: ${normalizeGrade(s.grade||'-')}</div>
<div>フリガナ: ${s.kana||''}</div>
